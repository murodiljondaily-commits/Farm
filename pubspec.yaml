name: agrivet
description: AgriVet - Qishloq xo'jaligi hayvonlarini boshqarish

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Localisation code-generation (l10n.yaml)
  intl: ^0.20.0

  # Local SQLite (mirrors bot database)
  sqflite: ^2.3.3
  path: ^1.9.0

  # State management
  provider: ^6.1.2

  # HTTP for API calls when backend is running
  http: ^1.2.1
  http_parser: ^4.0.0

  # Shared prefs for session/PIN
  shared_preferences: ^2.2.3

  # Navigation
  go_router: ^13.2.0

  # Image handling
  cached_network_image: ^3.3.1

  # Google Fonts (Roboto/Noto for Uzbek)
  google_fonts: ^6.2.1

  # Charts for reports
  fl_chart: ^0.68.0

  # Camera/image picker for animal photos
  image_picker: ^1.0.7

  # Crypto for PIN hashing
  crypto: ^3.0.3

  # UUID generation
  uuid: ^4.3.3

  # URL launcher for Sheets link
  url_launcher: ^6.2.6

  # Audio recording (STT mic input)
  record: ^7.0.0

  # Audio playback (TTS)
  audioplayers: ^6.0.0

  # Microphone + storage permissions
  permission_handler: ^11.3.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_storage: ^12.3.0

  # Google sign-in + Sheets (requires google-services.json setup)
  google_sign_in: ^6.2.1
  googleapis: ^13.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
  assets: []
